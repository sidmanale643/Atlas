
<style>
@keyframes pulse-ring { 0%{stroke-opacity:.6;stroke-width:1} 50%{stroke-opacity:.15;stroke-width:3} 100%{stroke-opacity:.6;stroke-width:1} }
@keyframes dash-flow { to { stroke-dashoffset: -24; } }
.flow-line { stroke-dasharray: 6 4; animation: dash-flow 1.4s linear infinite; }
.pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
.node-g { cursor: pointer; transition: opacity .15s; }
.node-g:hover { opacity: .82; }
#panel { transition: opacity .2s; }
#detail-box { transition: all .25s; }
</style>

<svg id="main-svg" width="100%" viewBox="0 0 680 620" role="img">
  <title>Atlas memory architecture — interactive</title>
  <desc>Click any node to see details about that component</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── tier labels ── -->
  <text class="ts" x="40" y="34" style="letter-spacing:.07em;font-size:11px;fill:var(--color-text-tertiary)">Capture</text>
  <line x1="40" y1="40" x2="640" y2="40" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

  <text class="ts" x="40" y="168" style="letter-spacing:.07em;font-size:11px;fill:var(--color-text-tertiary)">One write · two stores</text>
  <line x1="40" y1="174" x2="640" y2="174" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

  <text class="ts" x="40" y="318" style="letter-spacing:.07em;font-size:11px;fill:var(--color-text-tertiary)">Three ways back</text>
  <line x1="40" y1="324" x2="640" y2="324" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

  <!-- ── capture pipeline ── -->
  <!-- Natural language -->
  <g class="node-g c-gray" onclick="show('nl')">
    <rect x="28" y="52" width="128" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="92" y="75" text-anchor="middle" dominant-baseline="central">Natural</text>
    <text class="th" x="92" y="93" text-anchor="middle" dominant-baseline="central">language</text>
  </g>

  <!-- Arrow -->
  <line class="flow-line" x1="156" y1="78" x2="188" y2="78" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Schema-locked -->
  <g class="node-g c-gray" onclick="show('schema')">
    <rect x="188" y="52" width="148" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="262" y="75" text-anchor="middle" dominant-baseline="central">Schema-locked</text>
    <text class="th" x="262" y="93" text-anchor="middle" dominant-baseline="central">extraction</text>
  </g>

  <!-- Arrow -->
  <line class="flow-line" x1="336" y1="78" x2="362" y2="78" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Cortical map -->
  <g class="node-g c-gray" onclick="show('cortical')">
    <rect x="362" y="52" width="128" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="426" y="75" text-anchor="middle" dominant-baseline="central">Cortical map</text>
    <text class="ts" x="426" y="93" text-anchor="middle" dominant-baseline="central">11 regions</text>
  </g>

  <!-- Arrow -->
  <line class="flow-line" x1="490" y1="78" x2="516" y2="78" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Embedding -->
  <g class="node-g c-blue" onclick="show('embedding')">
    <rect x="516" y="52" width="128" height="52" rx="6" stroke-width="1"/>
    <circle class="pulse-ring" cx="580" cy="78" r="38" fill="none" stroke="var(--color-border-info)" stroke-width="1.5"/>
    <text class="th" x="580" y="75" text-anchor="middle" dominant-baseline="central">Embedding</text>
    <text class="ts" x="580" y="93" text-anchor="middle" dominant-baseline="central">384-d vector</text>
  </g>

  <!-- ── drop connectors from capture to stores ── -->
  <!-- spine from cortical/schema midpoint down -->
  <line class="flow-line" x1="310" y1="104" x2="310" y2="148" stroke="var(--color-border-secondary)" stroke-width="1"/>
  <line x1="152" y1="148" x2="518" y2="148" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- left drop to sqlite -->
  <line class="flow-line" x1="180" y1="148" x2="180" y2="188" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>
  <!-- right drop from embedding -->
  <line class="flow-line" x1="510" y1="104" x2="510" y2="148" stroke="var(--color-border-secondary)" stroke-width="1"/>
  <line class="flow-line" x1="510" y1="148" x2="510" y2="188" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── stores ── -->
  <!-- SQLite -->
  <g class="node-g c-teal" onclick="show('sqlite')">
    <rect x="28" y="188" width="300" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="52" y="213" dominant-baseline="central">SQLite</text>
    <text class="ts" x="228" y="213" text-anchor="middle" dominant-baseline="central" style="opacity:.65">engram.db</text>
    <text class="ts" x="178" y="233" text-anchor="middle" dominant-baseline="central">Source of truth · the graph</text>
    <text class="ts" x="178" y="252" text-anchor="middle" dominant-baseline="central" style="opacity:.55">memories · entities · relationships</text>
  </g>

  <!-- Qdrant -->
  <g class="node-g c-purple" onclick="show('qdrant')">
    <rect x="360" y="188" width="288" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="384" y="213" dominant-baseline="central">Qdrant</text>
    <text class="ts" x="504" y="213" text-anchor="middle" dominant-baseline="central" style="opacity:.65">atlas_memories</text>
    <text class="ts" x="504" y="233" text-anchor="middle" dominant-baseline="central">Semantic index</text>
    <text class="ts" x="504" y="252" text-anchor="middle" dominant-baseline="central" style="opacity:.55">384-d vectors · cosine distance</text>
  </g>

  <!-- ── connectors stores → retrieval ── -->
  <line x1="178" y1="268" x2="178" y2="296" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="504" y1="268" x2="504" y2="296" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="178" y1="296" x2="504" y2="296" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- drops to 3 retrieval boxes -->
  <line class="flow-line" x1="120" y1="296" x2="120" y2="338" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>
  <line class="flow-line" x1="340" y1="296" x2="340" y2="338" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>
  <line class="flow-line" x1="558" y1="296" x2="558" y2="338" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── retrieval boxes ── -->
  <!-- Semantic recall -->
  <g class="node-g c-gray" onclick="show('semantic')">
    <rect x="28" y="338" width="206" height="86" rx="8" stroke-width="0.5"/>
    <text class="th" x="131" y="362" text-anchor="middle" dominant-baseline="central">Semantic recall</text>
    <text class="ts" x="131" y="382" text-anchor="middle" dominant-baseline="central">Cosine-nearest vectors</text>
    <text class="ts" x="131" y="400" text-anchor="middle" dominant-baseline="central" style="opacity:.55">GET /api/memories/search</text>
  </g>

  <!-- Structural links -->
  <g class="node-g c-gray" onclick="show('structural')">
    <rect x="237" y="338" width="206" height="86" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="362" text-anchor="middle" dominant-baseline="central">Structural links</text>
    <text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">Shared entities or triples</text>
    <text class="ts" x="340" y="400" text-anchor="middle" dominant-baseline="central" style="opacity:.55">Graph traversal</text>
  </g>

  <!-- Entity catalog -->
  <g class="node-g c-gray" onclick="show('catalog')">
    <rect x="446" y="338" width="206" height="86" rx="8" stroke-width="0.5"/>
    <text class="th" x="549" y="362" text-anchor="middle" dominant-baseline="central">Entity &amp; catalog</text>
    <text class="ts" x="549" y="382" text-anchor="middle" dominant-baseline="central">Full-text across names</text>
    <text class="ts" x="549" y="400" text-anchor="middle" dominant-baseline="central" style="opacity:.55">GET /api/catalog</text>
  </g>

  <!-- ── converge to MCP client ── -->
  <line x1="131" y1="424" x2="131" y2="452" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="340" y1="424" x2="340" y2="452" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="549" y1="424" x2="549" y2="452" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="131" y1="452" x2="549" y2="452" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line class="flow-line" x1="340" y1="452" x2="340" y2="464" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- MCP Client -->
  <g class="node-g c-blue" onclick="show('mcp')">
    <rect x="236" y="464" width="208" height="46" rx="8" stroke-width="1" stroke-dasharray="5 3"/>
    <text class="th" x="340" y="487" text-anchor="middle" dominant-baseline="central">You / MCP client</text>
  </g>

  <!-- footer formula -->
  <text class="ts" x="340" y="542" text-anchor="middle" style="opacity:.4">Related-memories fuses structural + semantic — 1 − ∏(1 − signal)</text>
  <text class="ts" x="340" y="558" text-anchor="middle" style="opacity:.3">Surfaces: Atlas · Memories · Graph</text>

  <!-- ── detail panel overlay ── -->
  <g id="panel" style="display:none;pointer-events:none">
    <rect id="detail-box" x="160" y="200" width="360" height="140" rx="10" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
    <text id="d-title" class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central" style="font-size:15px"/>
    <text id="d-line1" class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central"/>
    <text id="d-line2" class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central"/>
    <text id="d-line3" class="ts" x="340" y="294" text-anchor="middle" dominant-baseline="central"/>
    <text class="ts" x="480" y="224" text-anchor="end" dominant-baseline="central" style="opacity:.4;font-size:12px">click anywhere to close</text>
  </g>
</svg>

<script>
const data = {
  nl:        { title: 'Natural language input', l1: 'Raw text from a conversation or document.', l2: 'No schema required — extraction handles structure.', l3: '' },
  schema:    { title: 'Schema-locked extraction', l1: 'Parses natural language into typed fields.', l2: 'Enforces the cortical map schema strictly.', l3: 'Produces structured entities, triples, and ROI tags.' },
  cortical:  { title: 'Cortical map (11 regions)', l1: 'Inspired by cortical organisation of long-term memory.', l2: '11 ROIs: identity, location, time, emotion, goal…', l3: 'Each memory is tagged to one or more regions.' },
  embedding: { title: 'Embedding (384-d vector)', l1: 'Sentence-transformer encodes the full memory text.', l2: '384 dimensions capture semantic meaning densely.', l3: 'Written to Qdrant for similarity search.' },
  sqlite:    { title: 'SQLite — engram.db', l1: 'Source of truth. Stores the full graph: memories,', l2: 'entities, relationships, extractions, region tags.', l3: 'Queried for structural and catalog retrieval.' },
  qdrant:    { title: 'Qdrant — atlas_memories', l1: 'Vector store holding 384-d embeddings.', l2: 'Retrieval uses cosine distance (ANN search).', l3: 'Fast approximate nearest-neighbour at scale.' },
  semantic:  { title: 'Semantic recall', l1: 'Embed the query, find cosine-nearest vectors.', l2: 'Returns memories that mean the same thing,', l3: 'even if phrased differently. /api/memories/search' },
  structural:{ title: 'Structural links', l1: 'Find memories sharing entities or RDF triples.', l2: 'Graph traversal over SQLite relationships.', l3: 'Catches exact co-references semantic recall misses.' },
  catalog:   { title: 'Entity & catalog', l1: 'Full-text search across names, aliases, summaries.', l2: 'Useful for proper nouns and exact entity lookup.', l3: '/api/catalog returns ranked matches.' },
  mcp:       { title: 'You / MCP client', l1: 'The consuming agent or human-facing interface.', l2: 'Receives fused results from all three retrieval paths.', l3: 'Signal fusion: 1 − ∏(1 − signal_i)' },
};

const panel = document.getElementById('panel');
const dTitle = document.getElementById('d-title');
const dL1 = document.getElementById('d-line1');
const dL2 = document.getElementById('d-line2');
const dL3 = document.getElementById('d-line3');
let open = false;

function show(id) {
  const d = data[id];
  dTitle.textContent = d.title;
  dL1.textContent = d.l1;
  dL2.textContent = d.l2;
  dL3.textContent = d.l3;
  panel.style.display = '';
  open = true;
}

document.getElementById('main-svg').addEventListener('click', function(e) {
  if (open && !e.target.closest('.node-g')) {
    panel.style.display = 'none';
    open = false;
  }
});
</script>
